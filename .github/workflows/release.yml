name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: cachix/install-nix-action@v31

      - name: Build, sign, notarize, and package
        id: package
        run: |
          nix develop --command make package
          SHA="${GITHUB_SHA::7}"
          # Standalone binary zip for easy install
          zip "tapkey-${SHA}-darwin-arm64.zip" -j Tapkey.app/Contents/MacOS/tapkey
          echo "app_zip=tapkey-${SHA}-arm64.zip" >> "$GITHUB_OUTPUT"
          echo "bin_zip=tapkey-${SHA}-darwin-arm64.zip" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Attest app bundle
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: ${{ steps.package.outputs.app_zip }}

      - name: Attest binary
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: ${{ steps.package.outputs.bin_zip }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            ${{ steps.package.outputs.app_zip }}
            ${{ steps.package.outputs.bin_zip }}

    outputs:
      sha: ${{ steps.package.outputs.sha }}
      app_zip: ${{ steps.package.outputs.app_zip }}
      bin_zip: ${{ steps.package.outputs.bin_zip }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build
        id: package
        run: |
          cargo build --release -p tapkey --no-default-features
          SHA="${GITHUB_SHA::7}"
          ZIP_NAME="tapkey-${SHA}-linux-x86_64.zip"
          zip "$ZIP_NAME" -j target/release/tapkey
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Attest
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: ${{ steps.package.outputs.zip_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: ${{ steps.package.outputs.zip_name }}

    outputs:
      zip_name: ${{ steps.package.outputs.zip_name }}

  release:
    needs: [build-macos, build-linux]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: cachix/install-nix-action@v31

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        run: |
          gh release create "$SHA" \
            "artifacts/macos-arm64/$APP_ZIP" \
            "artifacts/macos-arm64/$BIN_ZIP" \
            "artifacts/linux-x86_64/$LINUX_ZIP" \
            --title "tapkey $SHA" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.build-macos.outputs.sha }}
          APP_ZIP: ${{ needs.build-macos.outputs.app_zip }}
          BIN_ZIP: ${{ needs.build-macos.outputs.bin_zip }}
          LINUX_ZIP: ${{ needs.build-linux.outputs.zip_name }}

      - name: Update flake.nix with new release
        run: |
          SHA="${{ needs.build-macos.outputs.sha }}"
          BIN_ZIP="${{ needs.build-macos.outputs.bin_zip }}"
          LINUX_ZIP="${{ needs.build-linux.outputs.zip_name }}"

          MACOS_HASH=$(nix hash file --sri "artifacts/macos-arm64/$BIN_ZIP")
          LINUX_HASH=$(nix hash file --sri "artifacts/linux-x86_64/$LINUX_ZIP")

          MACOS_URL="https://github.com/jul-sh/tapkey/releases/download/${SHA}/${BIN_ZIP}"
          LINUX_URL="https://github.com/jul-sh/tapkey/releases/download/${SHA}/${LINUX_ZIP}"

          VERSION=$(grep '^version' cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          # Update flake.nix using python for reliable multi-line replacement
          python3 -c "
          import re, sys
          with open('flake.nix') as f: s = f.read()
          s = re.sub(r'version = \"[^\"]+\"', 'version = \"${VERSION}\"', s, count=1)
          s = re.sub(
              r'aarch64-darwin = \{[^}]+\}',
              'aarch64-darwin = {\n            url = \"${MACOS_URL}\";\n            hash = \"${MACOS_HASH}\";\n          }',
              s
          )
          s = re.sub(
              r'x86_64-linux = \{[^}]+\}',
              'x86_64-linux = {\n            url = \"${LINUX_URL}\";\n            hash = \"${LINUX_HASH}\";\n          }',
              s
          )
          with open('flake.nix', 'w') as f: f.write(s)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "Update flake.nix with release ${SHA}" || true
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
